<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browse Courses — EnrollmentPRO</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main class="page-content">
    <div class="container">
      <div class="page-title-container">
        <h1 class="page-title">University Course Catalog</h1>
        <p class="page-subtitle">Explore available courses for the current semester.</p>
      </div>

      <div class="table-wrapper animate-fade-in-up">
        <div class="table-header">
          <span>📖 All Available Courses</span>
        </div>
        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr>
                <th>Course Name</th>
                <th>Course ID</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="catalog-tbody">
              <tr><td colspan="3" class="table-empty">Loading course catalog...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script type="module">
    import { requireAuth } from '/js/guards.js';
    import { renderHeader } from '/js/components/header.js';
    import { renderFooter } from '/js/components/footer.js';
    import { showToast } from '/js/components/toast.js';
    import { getAllCourses } from '/js/services/course.service.js';
    import { enrollStudent, getStudentEnrollments } from '/js/services/enrollment.service.js';
    import { addCell } from '/js/utils.js';

    renderFooter();
    const { user, profile } = await requireAuth('student');
    renderHeader(user, 'student', 'browse');

    const tbody = document.getElementById('catalog-tbody');

    async function loadCatalog() {
      try {
        const [courses, enrollments] = await Promise.all([
          getAllCourses(),
          getStudentEnrollments(user.uid)
        ]);

        const enrollmentMap = {};
        enrollments.forEach(e => { enrollmentMap[e.courseId] = true; });

        tbody.innerHTML = '';
        if (courses.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" class="table-empty">No courses found in the catalog.</td></tr>';
          return;
        }

        courses.forEach(course => {
          const alreadyEnrolled = enrollmentMap[course.id];
          const tr = document.createElement('tr');

          addCell(tr, course.name);
          addCell(tr, course.id);

          const actionTd = document.createElement('td');
          if (alreadyEnrolled) {
            const span = document.createElement('span');
            span.className = 'badge badge-success';
            span.textContent = 'Enrolled';
            actionTd.appendChild(span);
          } else {
            const enrollBtn = document.createElement('button');
            enrollBtn.className = 'btn btn-primary btn-sm';
            enrollBtn.textContent = 'Enroll Now';
            enrollBtn.addEventListener('click', () => enrollInCourse(course.id, course.name));
            actionTd.appendChild(enrollBtn);
          }
          tr.appendChild(actionTd);
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error('Load catalog error:', err);
        tbody.innerHTML = '<tr><td colspan="3" class="table-empty text-error">Failed to load course catalog.</td></tr>';
      }
    }

    async function enrollInCourse(courseId, courseName) {
      if (!confirm(`Enroll in ${courseName}?`)) return;
      try {
        await enrollStudent(user.uid, courseId, profile.semester || '1');
        showToast(`Enrollment request sent for ${courseName}`, 'success');
        loadCatalog();
      } catch (err) {
        console.error('Enroll error:', err);
        showToast('Failed to enroll: ' + err.message, 'error');
      }
    }

    loadCatalog();
  </script>

</body>
</html>
