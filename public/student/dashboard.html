<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Dashboard — EnrollmentPRO</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main class="page-content">
    <div class="container">
      <!-- Dashboard Header -->
      <div class="dashboard-header animate-fade-in-up">
        <h1 class="dashboard-title">Welcome, <span id="student-name" class="text-primary">...</span></h1>
        <p class="dashboard-subtitle">Here's your academic overview</p>
      </div>

      <!-- Stats Row -->
      <div class="grid-3 mb-8 stagger">
        <div class="card stat-card animate-fade-in-up">
          <div class="stat-value" id="stat-semester">—</div>
          <div class="stat-label">Current Semester</div>
        </div>
        <div class="card stat-card animate-fade-in-up">
          <div class="stat-value" id="stat-courses">—</div>
          <div class="stat-label">Enrolled Courses</div>
        </div>
        <div class="card stat-card animate-fade-in-up">
          <div class="stat-value" id="stat-status">—</div>
          <div class="stat-label">Enrollment Status</div>
        </div>
      </div>

      <!-- Main Grid -->
      <div class="grid-2 stagger">
        <!-- Profile Card -->
        <div class="card animate-fade-in-up">
          <div class="card-header">👤 My Profile</div>
          <div class="card-body profile-card" style="text-align:left;">
            <div style="display:flex; align-items:center; gap:var(--space-4); margin-bottom:var(--space-6);">
              <div class="profile-avatar" id="profile-avatar">?</div>
              <div>
                <div class="profile-name" id="profile-name">Loading...</div>
                <div class="profile-role">Student · Computer Science</div>
                <div class="profile-id" id="profile-email">—</div>
              </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--space-3);">
              <div>
                <div class="text-muted" style="font-size:var(--font-size-xs);">Phone</div>
                <div style="font-weight:500; font-size:var(--font-size-sm);" id="profile-phone">—</div>
              </div>
              <div>
                <div class="text-muted" style="font-size:var(--font-size-xs);">Date of Birth</div>
                <div style="font-weight:500; font-size:var(--font-size-sm);" id="profile-dob">—</div>
              </div>
              <div>
                <div class="text-muted" style="font-size:var(--font-size-xs);">Semester</div>
                <div style="font-weight:500; font-size:var(--font-size-sm);" id="profile-semester">—</div>
              </div>
              <div>
                <div class="text-muted" style="font-size:var(--font-size-xs);">Address</div>
                <div style="font-weight:500; font-size:var(--font-size-sm);" id="profile-address">—</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Courses Card -->
        <div class="card animate-fade-in-up">
          <div class="card-header">📚 My Courses</div>
          <div class="card-body">
            <ul id="courses-list" style="list-style:none; display:flex; flex-direction:column; gap:var(--space-3);">
              <li class="skeleton skeleton-text" style="height:2.5rem;"></li>
              <li class="skeleton skeleton-text" style="height:2.5rem;"></li>
              <li class="skeleton skeleton-text" style="height:2.5rem;"></li>
            </ul>
          </div>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="mt-8">
        <h2 style="font-size:var(--font-size-xl); font-weight:700; margin-bottom:var(--space-4);">Quick Actions</h2>
        <div class="grid-3 stagger">
          <a href="/student/enrollment-status.html" class="card action-card animate-fade-in-up">
            <div class="action-card-icon">📝</div>
            <div class="action-card-title">Enrollment Status</div>
          </a>
          <a href="/student/my-courses.html" class="card action-card animate-fade-in-up">
            <div class="action-card-icon">📚</div>
            <div class="action-card-title">My Courses & Grades</div>
          </a>
          <a href="/about.html" class="card action-card animate-fade-in-up">
            <div class="action-card-icon">ℹ️</div>
            <div class="action-card-title">About Platform</div>
          </a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script type="module">
    import { requireAuth } from '/js/guards.js';
    import { renderHeader } from '/js/components/header.js';
    import { renderFooter } from '/js/components/footer.js';
    import { db } from '/js/firebase-config.js';
    import { collection, query, where, getDocs, doc, getDoc }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getInitials, formatDate, formatPhone } from '/js/utils.js';

    renderFooter();

    // Guard — only students
    const { user, profile } = await requireAuth('student');
    renderHeader(user, 'student', 'dashboard');

    // Populate profile
    document.getElementById('student-name').textContent = profile.name || 'Student';
    document.getElementById('profile-name').textContent = profile.name || '—';
    document.getElementById('profile-avatar').textContent = getInitials(profile.name);
    document.getElementById('profile-email').textContent = profile.email || '—';
    document.getElementById('profile-phone').textContent = formatPhone(profile.phone);
    document.getElementById('profile-dob').textContent = formatDate(profile.dob);
    document.getElementById('profile-semester').textContent = profile.semester ? `Semester ${profile.semester}` : '—';
    document.getElementById('profile-address').textContent = profile.address || '—';
    document.getElementById('stat-semester').textContent = profile.semester || '—';

    // Fetch enrollments
    try {
      const enrollQ = query(
        collection(db, 'enrollments'),
        where('studentId', '==', user.uid)
      );
      const enrollSnap = await getDocs(enrollQ);
      const enrollments = [];
      enrollSnap.forEach(d => enrollments.push({ id: d.id, ...d.data() }));

      document.getElementById('stat-courses').textContent = enrollments.length;

      // Determine latest enrollment status
      const enrolled = enrollments.filter(e => e.status === 'Enrolled');
      const pending = enrollments.filter(e => e.status === 'Pending');
      if (enrolled.length > 0) {
        document.getElementById('stat-status').textContent = 'Enrolled';
        document.getElementById('stat-status').style.color = 'var(--color-success)';
      } else if (pending.length > 0) {
        document.getElementById('stat-status').textContent = 'Pending';
        document.getElementById('stat-status').style.color = 'var(--color-warning)';
      } else {
        document.getElementById('stat-status').textContent = 'None';
      }

      // Fetch course names for enrolled courses
      const coursesList = document.getElementById('courses-list');
      coursesList.innerHTML = '';

      if (enrollments.length === 0) {
        coursesList.innerHTML = '<li class="text-muted" style="text-align:center; padding:var(--space-4);">No courses enrolled yet</li>';
      } else {
        for (const enrollment of enrollments) {
          if (enrollment.courseId) {
            const courseDoc = await getDoc(doc(db, 'courses', enrollment.courseId));
            const li = document.createElement('li');
            li.style.cssText = 'display:flex; align-items:center; justify-content:space-between; padding:var(--space-3) var(--space-4); background:var(--color-surface-alt); border-radius:var(--radius-md);';
            
            const nameSpan = document.createElement('span');
            nameSpan.style.fontWeight = '500';
            nameSpan.textContent = courseDoc.exists() ? courseDoc.data().name : 'Unknown Course';
            
            const badge = document.createElement('span');
            badge.className = `badge ${enrollment.status === 'Enrolled' ? 'badge-success' : 'badge-warning'}`;
            badge.textContent = enrollment.status || 'Pending';
            
            li.appendChild(nameSpan);
            li.appendChild(badge);
            coursesList.appendChild(li);
          }
        }
      }
    } catch (err) {
      console.error('Error loading dashboard data:', err);
      document.getElementById('stat-courses').textContent = '!';
      document.getElementById('stat-status').textContent = 'Error';
    }
  </script>

</body>
</html>
