<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Courses — EnrollmentPRO</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main class="page-content">
    <div class="container">
      <div class="page-title-container">
        <h1 class="page-title">My Courses & Grades</h1>
      </div>

      <div class="table-wrapper animate-fade-in-up">
        <div class="table-header">
          <span>📚 Enrolled Courses</span>
        </div>
        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr>
                <th>Course</th>
                <th>Enrollment Status</th>
                <th>Grade</th>
                <th>Enrollment Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="courses-tbody">
              <tr><td colspan="5" class="table-empty">Loading courses...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script type="module">
    import { requireAuth } from '/js/guards.js';
    import { renderHeader } from '/js/components/header.js';
    import { renderFooter } from '/js/components/footer.js';
    import { showToast } from '/js/components/toast.js';
    import { db } from '/js/firebase-config.js';
    import { collection, query, where, getDocs, doc, getDoc, deleteDoc }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { formatDate, addCell, addBadgeCell } from '/js/utils.js';

    renderFooter();
    const { user, profile } = await requireAuth('student');
    renderHeader(user, 'student', 'courses');

    const tbody = document.getElementById('courses-tbody');

    async function loadCourses() {
      try {
        // Get all enrollments
        const enrollSnap = await getDocs(
          query(collection(db, 'enrollments'), where('studentId', '==', user.uid))
        );

        // Get all grades for this student
        const gradeSnap = await getDocs(
          query(collection(db, 'grades'), where('studentId', '==', user.uid))
        );
        const gradesMap = {};
        gradeSnap.forEach(d => {
          const g = d.data();
          gradesMap[g.courseId] = g.grade;
        });

        tbody.innerHTML = '';

        if (enrollSnap.empty) {
          tbody.innerHTML = '<tr><td colspan="5" class="table-empty">No courses enrolled yet. Browse the catalog to get started.</td></tr>';
          return;
        }

        for (const d of enrollSnap.docs) {
          const data = d.data();
          const tr = document.createElement('tr');

          // Get course name
          let courseName = '—';
          if (data.courseId) {
            const courseDoc = await getDoc(doc(db, 'courses', data.courseId));
            if (courseDoc.exists()) courseName = courseDoc.data().name;
          }

          addCell(tr, courseName);
          addBadgeCell(tr, data.status || 'Pending', data.status === 'Enrolled' ? 'success' : 'warning');

          // Grade
          const grade = gradesMap[data.courseId];
          if (grade) {
            const gradeType = ['A+', 'A', 'B+', 'B'].includes(grade) ? 'success'
              : ['C+', 'C'].includes(grade) ? 'warning'
              : 'error';
            addBadgeCell(tr, grade, gradeType);
          } else {
            addCell(tr, 'Not graded');
          }

          addCell(tr, formatDate(data.enrollmentDate));

          // Drop Button
          const actionTd = document.createElement('td');
          const dropBtn = document.createElement('button');
          dropBtn.className = 'btn btn-danger btn-sm';
          dropBtn.textContent = 'Drop';
          
          const enrollmentId = d.id;
          const currentCourseName = courseName;

          dropBtn.onclick = async () => {
            if (!confirm(`Are you sure you want to drop ${currentCourseName}? This action cannot be undone.`)) return;

            try {
              dropBtn.disabled = true;
              dropBtn.textContent = 'Dropping...';
              
              await deleteDoc(doc(db, 'enrollments', enrollmentId));
              showToast(`Successfully dropped ${currentCourseName}`, 'success');
              
              // Refresh the list
              loadCourses();
            } catch (err) {
              console.error('Drop error:', err);
              showToast('Failed to drop course. Please try again.', 'error');
              dropBtn.disabled = false;
              dropBtn.textContent = 'Drop';
            }
          };
          
          actionTd.appendChild(dropBtn);
          tr.appendChild(actionTd);

          tbody.appendChild(tr);
        }
      } catch (err) {
        console.error('Load courses error:', err);
        tbody.innerHTML = '<tr><td colspan="5" class="table-empty text-error">Failed to load courses. Check your connection.</td></tr>';
      }
    }

    loadCourses();
  </script>

</body>
</html>
