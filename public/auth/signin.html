<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In — EnrollmentPRO</title>
  <meta name="description" content="Sign in to your EnrollmentPRO account." />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body style="padding-top:0;">

  <header class="site-header" id="site-header"></header>

  <main class="auth-layout" style="padding-top:var(--header-height);">
    <div class="auth-card form-card animate-scale-in">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your EnrollmentPRO account</p>

      <form id="signin-form">
        <div class="form-group">
          <label for="login-id" class="form-label form-label--required">Username or Email</label>
          <input type="text" id="login-id" class="form-input" placeholder="Enter your username or email" required />
        </div>

        <div class="form-group">
          <label for="password" class="form-label form-label--required">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required minlength="6" autocomplete="current-password" />
        </div>

        <div id="error-msg" class="form-error" style="text-align:center; margin-bottom:var(--space-4); display:none;"></div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/auth/signup.html">Sign Up</a>
      </div>
    </div>
  </main>

  <script type="module">
    import { renderHeader } from '/js/components/header.js';
    import { signin, getUserRole } from '/js/auth.js';
    import { redirectIfAuth } from '/js/guards.js';
    import { showToast } from '/js/components/toast.js';
    import { getFriendlyError } from '/js/utils.js';

    // Render public header
    renderHeader(null, null, 'signin');

    // Redirect if already logged in
    await redirectIfAuth();

    // Form handling
    const loginForm = document.getElementById('signin-form');
    const submitBtn = document.getElementById('submit-btn');

    // Handle login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('login-id').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showToast('Please enter both email and password', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const { profile } = await login(email, password);
        showToast(`Welcome back, ${profile.name}!`, 'success');
        
        // Redirect based on role
        setTimeout(() => {
          if (profile.role === 'student') window.location.href = '/student/dashboard.html';
          else if (profile.role === 'faculty') window.location.href = '/faculty/dashboard.html';
          else if (profile.role === 'admin') window.location.href = '/admin/dashboard.html';
        }, 1000);
      } catch (err) {
        console.error(err);
        let msg = 'Failed to sign in. Please check your credentials.';
        if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
        if (err.code === 'auth/wrong-password') msg = 'Incorrect password.';
        showToast(msg, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>

</body>
</html>
