<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manage Courses — EnrollmentPRO</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main class="page-content">
    <div class="container">
      <div class="page-title-container">
        <h1 class="page-title">Course Management</h1>
      </div>

      <!-- Add Form -->
      <div class="form-card mb-8 animate-fade-in-up">
        <h2 style="font-size:var(--font-size-lg); font-weight:700; margin-bottom:var(--space-5);">Add New Course</h2>
        <form id="add-form">
          <div class="form-group">
            <label for="courseName" class="form-label form-label--required">Course Name</label>
            <input type="text" id="courseName" class="form-input" placeholder="e.g. Data Structures & Algorithms" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Add Course</button>
        </form>
        <div id="message" style="margin-top:var(--space-4); text-align:center;"></div>
      </div>

      <!-- Table -->
      <div class="table-wrapper animate-fade-in-up">
        <div class="table-header">📚 All Courses</div>
        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr><th>Course Name</th><th>Created At</th><th>Action</th></tr>
            </thead>
            <tbody id="table-body">
              <tr><td colspan="3" class="table-empty">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script type="module">
    import { requireAuth } from '/js/guards.js';
    import { renderHeader } from '/js/components/header.js';
    import { renderFooter } from '/js/components/footer.js';
    import { showToast } from '/js/components/toast.js';
    import { db } from '/js/firebase-config.js';
    import { collection, addDoc, getDocs, deleteDoc, doc, query, orderBy }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { formatDate, addCell } from '/js/utils.js';

    renderFooter();
    const { user } = await requireAuth('faculty');
    renderHeader(user, 'faculty', '');

    const tbody = document.getElementById('table-body');
    const form = document.getElementById('add-form');

    async function loadData() {
      const snap = await getDocs(query(collection(db, 'courses'), orderBy('createdAt', 'desc')));
      tbody.innerHTML = '';
      if (snap.empty) { tbody.innerHTML = '<tr><td colspan="3" class="table-empty">No courses yet.</td></tr>'; return; }
      snap.forEach(d => {
        const data = d.data();
        const tr = document.createElement('tr');
        addCell(tr, data.name);
        addCell(tr, formatDate(data.createdAt));
        const actionTd = document.createElement('td');
        const delBtn = document.createElement('button');
        delBtn.className = 'btn btn-danger btn-sm';
        delBtn.textContent = 'Delete';
        delBtn.addEventListener('click', async () => {
          if (confirm('Delete this course?')) {
            await deleteDoc(doc(db, 'courses', d.id));
            showToast('Course deleted', 'success');
            loadData();
          }
        });
        actionTd.appendChild(delBtn);
        tr.appendChild(actionTd);
        tbody.appendChild(tr);
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('courseName').value.trim();
      if (!name) return;
      try {
        await addDoc(collection(db, 'courses'), { name, createdAt: new Date().toISOString() });
        showToast('Course added!', 'success');
        form.reset();
        loadData();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    loadData();
  </script>

</body>
</html>
