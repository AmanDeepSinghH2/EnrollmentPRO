<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manage Courses — EnrollmentPRO</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main class="page-content">
    <div class="container">
      <div class="page-title-container">
        <h1 class="page-title">Course Management</h1>
      </div>

      <!-- Add Form -->
      <div class="form-card mb-8 animate-fade-in-up">
        <h2 style="font-size:var(--font-size-lg); font-weight:700; margin-bottom:var(--space-5);">Add New Course</h2>
        <form id="add-form">
          <div class="form-group">
            <label for="courseName" class="form-label form-label--required">Course Name</label>
            <input type="text" id="courseName" class="form-input" placeholder="e.g. Data Structures & Algorithms" required />
          </div>
          <div style="display: flex; gap: var(--space-4); margin-bottom: var(--space-4);">
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
              <label for="seatLimit" class="form-label form-label--required">Seat Limit</label>
              <input type="number" id="seatLimit" class="form-input" min="1" value="30" required />
            </div>
            <div class="form-group" style="flex: 1; margin-bottom: 0;">
              <label for="semester" class="form-label form-label--required">Semester</label>
              <select id="semester" class="form-select" required>
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Add Course</button>
        </form>
        <div id="message" style="margin-top:var(--space-4); text-align:center;"></div>
      </div>

      <!-- Table -->
      <div class="table-wrapper animate-fade-in-up">
        <div class="table-header">📚 All Courses</div>
        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr><th>Course Name</th><th>Seat Limit</th><th>Semester</th><th>Created At</th><th>Action</th></tr>
            </thead>
            <tbody id="table-body">
              <tr><td colspan="5" class="table-empty">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script type="module">
    import { requireAuth } from '/js/guards.js';
    import { renderHeader } from '/js/components/header.js';
    import { renderFooter } from '/js/components/footer.js';
    import { showToast } from '/js/components/toast.js';
    import { getAllCourses, addCourse, deleteCourse, getCoursesForFaculty, takeUpCourse, dropTeachingCourse } from '/js/services/course.service.js';
    import { formatDate, addCell } from '/js/utils.js';

    renderFooter();
    const { user } = await requireAuth('faculty');
    renderHeader(user, 'faculty', '');

    const tbody = document.getElementById('table-body');
    const form = document.getElementById('add-form');

    async function loadData() {
      try {
        const [courses, myAssignments] = await Promise.all([
          getAllCourses(),
          getCoursesForFaculty(user.uid)
        ]);
        
        // Map of courseId -> assignmentId for the current faculty
        const myCoursesMap = {};
        myAssignments.forEach(a => { myCoursesMap[a.courseId] = a.assignmentId; });

        tbody.innerHTML = '';
        if (courses.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="table-empty">No courses yet.</td></tr>';
          return;
        }
        
        courses.forEach(course => {
          const tr = document.createElement('tr');
          addCell(tr, course.name);
          addCell(tr, course.seatLimit || '30');
          addCell(tr, course.semester || '1');
          addCell(tr, formatDate(course.createdAt));
          
          const actionTd = document.createElement('td');
          actionTd.style.display = 'flex';
          actionTd.style.gap = 'var(--space-2)';
          
          // Take Up / Drop Logic
          const assignmentId = myCoursesMap[course.id];
          if (assignmentId) {
            const dropBtn = document.createElement('button');
            dropBtn.className = 'btn btn-secondary btn-sm';
            dropBtn.textContent = 'Drop Course';
            dropBtn.addEventListener('click', async () => {
              if (confirm('Stop teaching this course?')) {
                try {
                  await dropTeachingCourse(assignmentId);
                  showToast('You are no longer teaching this course.', 'success');
                  loadData();
                } catch (err) {
                  showToast(err.message, 'error');
                }
              }
            });
            actionTd.appendChild(dropBtn);
          } else {
            const takeBtn = document.createElement('button');
            takeBtn.className = 'btn btn-primary btn-sm';
            takeBtn.textContent = 'Take Up';
            takeBtn.addEventListener('click', async () => {
              if (confirm('Start teaching this course?')) {
                try {
                  await takeUpCourse(course.id, user.uid);
                  showToast('You are now teaching this course.', 'success');
                  loadData();
                } catch (err) {
                  showToast(err.message, 'error');
                }
              }
            });
            actionTd.appendChild(takeBtn);
          }

          const delBtn = document.createElement('button');
          delBtn.className = 'btn btn-danger btn-sm';
          delBtn.textContent = 'Delete';
          delBtn.addEventListener('click', async () => {
            if (confirm('Delete this course from the catalog completely?')) {
              try {
                await deleteCourse(course.id);
                showToast('Course deleted', 'success');
                loadData();
              } catch (err) {
                showToast(err.message, 'error');
              }
            }
          });
          actionTd.appendChild(delBtn);
          
          tr.appendChild(actionTd);
          tbody.appendChild(tr);
        });
      } catch (err) {
        showToast('Error loading courses: ' + err.message, 'error');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('courseName').value.trim();
      const seatLimit = document.getElementById('seatLimit').value || 30;
      const semester = document.getElementById('semester').value || '1';
      
      if (!name) return;
      try {
        await addCourse(name, seatLimit, semester);
        showToast('Course added!', 'success');
        form.reset();
        loadData();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    loadData();
  </script>

</body>
</html>
