<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manage Enrollments — EnrollmentPRO</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <header class="site-header" id="site-header"></header>

  <main class="page-content">
    <div class="container">
      <div class="page-title-container">
        <h1 class="page-title">Enrollment Management</h1>
      </div>

      <div class="form-card mb-8 animate-fade-in-up">
        <h2 style="font-size:var(--font-size-lg); font-weight:700; margin-bottom:var(--space-5);">Add New Enrollment</h2>
        <form id="add-form">
          <div class="form-group">
            <label for="studentId" class="form-label form-label--required">Student</label>
            <select id="studentId" class="form-select" required>
              <option value="">Select Student</option>
            </select>
          </div>
          <div class="form-group">
            <label for="courseId" class="form-label form-label--required">Course</label>
            <select id="courseId" class="form-select" required>
              <option value="">Select Course</option>
            </select>
          </div>
          <div class="form-group">
            <label for="status" class="form-label">Status</label>
            <select id="status" class="form-select">
              <option value="Pending">Pending</option>
              <option value="Enrolled">Enrolled</option>
            </select>
          </div>
          <div class="form-group">
            <label for="enrollmentDate" class="form-label">Enrollment Date</label>
            <input type="date" id="enrollmentDate" class="form-input" />
          </div>
          <div class="form-group">
            <label for="semester" class="form-label">Semester</label>
            <select id="semester" class="form-select">
              <option value="1">Semester 1</option>
              <option value="2">Semester 2</option>
              <option value="3">Semester 3</option>
              <option value="4">Semester 4</option>
              <option value="5">Semester 5</option>
              <option value="6">Semester 6</option>
              <option value="7">Semester 7</option>
              <option value="8">Semester 8</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Add Enrollment</button>
        </form>
      </div>

      <div class="table-wrapper animate-fade-in-up">
        <div class="table-header">📝 All Enrollments</div>
        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr><th>Student</th><th>Course</th><th>Status</th><th>Semester</th><th>Date</th><th>Action</th></tr>
            </thead>
            <tbody id="table-body">
              <tr><td colspan="6" class="table-empty">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script type="module">
    import { requireAuth } from '/js/guards.js';
    import { renderHeader } from '/js/components/header.js';
    import { renderFooter } from '/js/components/footer.js';
    import { showToast } from '/js/components/toast.js';
    import { getAllEnrollments, approveEnrollment, dropEnrollment, enrollStudent } from '/js/services/enrollment.service.js';
    import { getAllStudents, buildUserMap } from '/js/services/user.service.js';
    import { getAllCourses, buildCourseMap } from '/js/services/course.service.js';
    import { addCell, addBadgeCell, formatDate } from '/js/utils.js';

    renderFooter();
    const { user } = await requireAuth('faculty');
    renderHeader(user, 'faculty', '');

    const tbody = document.getElementById('table-body');
    const form = document.getElementById('add-form');
    const studentSelect = document.getElementById('studentId');
    const courseSelect = document.getElementById('courseId');

    // Maps for fast lookups
    let usersMap = {};
    let coursesMap = {};

    async function initialize() {
      try {
        const [students, courses] = await Promise.all([
          getAllStudents(),
          getAllCourses()
        ]);

        usersMap = buildUserMap(students);
        coursesMap = buildCourseMap(courses);

        // Populate selects
        students.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = `${s.name} (${s.email})`;
          studentSelect.appendChild(opt);
        });

        courses.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.name;
          courseSelect.appendChild(opt);
        });

        loadData();
      } catch (err) {
        showToast('Initialization error: ' + err.message, 'error');
      }
    }

    // Set default date
    document.getElementById('enrollmentDate').valueAsDate = new Date();

    async function loadData() {
      try {
        const enrollments = await getAllEnrollments();
        tbody.innerHTML = '';
        if (enrollments.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="table-empty">No enrollments yet.</td></tr>';
          return;
        }

        enrollments.forEach(enrollment => {
          const tr = document.createElement('tr');
          addCell(tr, usersMap[enrollment.studentId]?.name || enrollment.studentId);
          addCell(tr, coursesMap[enrollment.courseId]?.name || enrollment.courseId);
          addBadgeCell(tr, enrollment.status, enrollment.status === 'Enrolled' ? 'success' : 'warning');
          addCell(tr, enrollment.semester || '—');
          addCell(tr, formatDate(enrollment.enrollmentDate));

          const actionTd = document.createElement('td');
          actionTd.style.display = 'flex';
          actionTd.style.gap = 'var(--space-2)';

          if (enrollment.status === 'Pending') {
            const approveBtn = document.createElement('button');
            approveBtn.className = 'btn btn-primary btn-sm';
            approveBtn.textContent = 'Approve';
            approveBtn.addEventListener('click', async () => {
              try {
                await approveEnrollment(enrollment.id);
                showToast('Enrollment approved!', 'success');
                loadData();
              } catch (err) {
                showToast(err.message, 'error');
              }
            });
            actionTd.appendChild(approveBtn);
          }

          const delBtn = document.createElement('button');
          delBtn.className = 'btn btn-danger btn-sm';
          delBtn.textContent = 'Delete';
          delBtn.addEventListener('click', async () => {
            if (confirm('Delete this enrollment?')) {
              try {
                await dropEnrollment(enrollment.id);
                showToast('Enrollment deleted', 'success');
                loadData();
              } catch (err) {
                showToast(err.message, 'error');
              }
            }
          });
          actionTd.appendChild(delBtn);
          tr.appendChild(actionTd);
          tbody.appendChild(tr);
        });
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="6" class="table-empty text-error">Error loading data.</td></tr>';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const studentId = studentSelect.value;
      const courseId = courseSelect.value;
      const status = document.getElementById('status').value;
      const date = document.getElementById('enrollmentDate').value || new Date().toISOString();
      const semester = document.getElementById('semester').value;

      if (!studentId || !courseId) return;

      try {
        await enrollStudent(studentId, courseId, semester, status, date);
        showToast('Enrollment added!', 'success');
        form.reset();
        document.getElementById('enrollmentDate').valueAsDate = new Date();
        loadData();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    initialize();
  </script>

</body>
</html>
