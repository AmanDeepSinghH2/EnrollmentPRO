<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up - EnrollmentPRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-gray-200 to-gray-400 text-center">

  <!-- Header -->
  <nav class="flex justify-between items-center bg-gradient-to-r from-gray-800 to-teal-600 p-4 text-white">
    <h1 class="text-3xl font-bold cursor-pointer" onclick="window.location.href='index.html'">EnrollmentPRO</h1>
  </nav>

  <!-- Sign Up Form -->
  <div class="flex justify-center items-center h-screen bg-white shadow-lg p-10 mx-auto my-10 rounded-lg">
    <div class="w-2/3">
      <h2 class="text-2xl font-bold mb-6">Create Your Profile</h2>
      <form id="signupForm">

        <div class="mb-4">
          <label for="role" class="block text-left text-lg font-medium">I am a:</label>
          <select id="role" name="role" class="w-full p-2 rounded-md border-gray-300" required onchange="toggleFields()">
            <option value="faculty">Faculty</option>
            <option value="student">Student</option>
          </select>
        </div>

        <div class="mb-4">
          <label for="username" class="block text-left text-lg font-medium">Username</label>
          <input type="text" id="username" name="username" class="w-full p-2 rounded-md border-gray-300" required />
        </div>

        <div class="mb-4">
          <label for="emailid" class="block text-left text-lg font-medium">Email</label>
          <input type="email" id="emailid" name="emailid" class="w-full p-2 rounded-md border-gray-300" required />
        </div>

        <div class="mb-4">
          <label for="password" class="block text-left text-lg font-medium">Password</label>
          <input type="password" id="password" name="password" class="w-full p-2 rounded-md border-gray-300" required />
        </div>

        <!-- Faculty Fields -->
        <div id="facultyFields" class="mb-4">
          <label for="facultyName" class="block text-left text-lg font-medium">Full Name</label>
          <input type="text" id="facultyName" name="facultyName" class="w-full p-2 rounded-md border-gray-300" />
          
          <label for="facultyPhoneNumber" class="block text-left text-lg font-medium">Phone Number</label>
          <input type="text" id="facultyPhoneNumber" name="facultyPhoneNumber" class="w-full p-2 rounded-md border-gray-300" />
          
          <label for="facultyDOB" class="block text-left text-lg font-medium">Date of Birth</label>
          <input type="date" id="facultyDOB" name="facultyDOB" class="w-full p-2 rounded-md border-gray-300" />
        </div>

        <!-- Student Fields (hidden by default) -->
        <div id="studentFields" class="mb-4 hidden">
          <label for="studentName" class="block text-left text-lg font-medium">Full Name</label>
          <input type="text" id="studentName" name="studentName" class="w-full p-2 rounded-md border-gray-300" />
          
          <label for="studentAddress" class="block text-left text-lg font-medium">Address</label>
          <input type="text" id="studentAddress" name="studentAddress" class="w-full p-2 rounded-md border-gray-300" />
          
          <label for="studentPhoneNumber" class="block text-left text-lg font-medium">Phone Number</label>
          <input type="text" id="studentPhoneNumber" name="studentPhoneNumber" class="w-full p-2 rounded-md border-gray-300" />
          
          <label for="studentDOB" class="block text-left text-lg font-medium">Date of Birth</label>
          <input type="date" id="studentDOB" name="studentDOB" class="w-full p-2 rounded-md border-gray-300" />

          <label for="studentSemester" class="block text-left text-lg font-medium">Semester</label>
          <input type="number" id="studentSemester" name="studentSemester" min="1" max="8" value="1" class="w-full p-2 rounded-md border-gray-300" />
        </div>

        <button type="submit" class="bg-teal-600 text-white py-2 px-4 rounded hover:bg-teal-500 mt-4">Sign Up</button>
        <button type="button" class="bg-teal-600 text-white py-2 px-4 rounded hover:bg-teal-500 mt-4" onclick="window.location.href='index.html'">Back</button>

      </form>

      <div id="message" class="mt-4 text-red-600 font-semibold"></div>

      <script>
        const signupForm = document.getElementById("signupForm");
        const messageDiv = document.getElementById("message");
        const facultyFields = document.getElementById("facultyFields");
        const studentFields = document.getElementById("studentFields");

        function toggleFields() {
          const role = signupForm.role.value;
          if (role === "student") {
            facultyFields.classList.add("hidden");
            studentFields.classList.remove("hidden");
          } else {
            facultyFields.classList.remove("hidden");
            studentFields.classList.add("hidden");
          }
        }

        signupForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          messageDiv.textContent = "";

          const username = signupForm.username.value.trim();
          const emailid = signupForm.emailid.value.trim();
          const password = signupForm.password.value;
          const role = signupForm.role.value;

          let payload = { username, emailid, password, role };

          if (role === "faculty") {
            payload.facultyName = signupForm.facultyName.value.trim();
            payload.facultyPhoneNumber = signupForm.facultyPhoneNumber.value.trim();
            payload.facultyDOB = signupForm.facultyDOB.value;
            
            if (!payload.facultyName) {
              messageDiv.textContent = "Full name is required.";
              return;
            }
          } else {
            payload.studentName = signupForm.studentName.value.trim();
            payload.studentAddress = signupForm.studentAddress.value.trim();
            payload.studentPhoneNumber = signupForm.studentPhoneNumber.value.trim();
            payload.studentDOB = signupForm.studentDOB.value;
            payload.studentSemester = signupForm.studentSemester.value;

            if (!payload.studentName) {
              messageDiv.textContent = "Full name is required.";
              return;
            }
          }

          if (username.length < 3 || password.length < 6) {
            messageDiv.textContent = "Username must be at least 3 characters and password at least 6 characters.";
            return;
          }

          try {
            const response = await fetch("backend/signup.php", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(payload),
            });

            const result = await response.json();

            if (response.ok) {
              messageDiv.style.color = "green";
              messageDiv.textContent = result.message;
              signupForm.reset();
              setTimeout(() => {
                window.location.href = role === "faculty" ? "faculty_login.html" : "student_login.html";
              }, 2000);
            } else {
              messageDiv.style.color = "red";
              messageDiv.textContent = result.error || "Sign up failed";
            }
          } catch (error) {
            messageDiv.style.color = "red";
            messageDiv.textContent = "Error connecting to server";
          }
        });
      </script>

    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gradient-to-r from-gray-800 to-teal-600 text-white p-4 text-center">
    <strong>EnrollmentPRO</strong>
  </footer>

</body>
</html>
